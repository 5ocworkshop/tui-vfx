# ═══════════════════════════════════════════════════════════════════════════════
# RECIPES
# Proven effect combinations.
# ═══════════════════════════════════════════════════════════════════════════════

[recipes.elegant_modal_enter]
description = "Sophisticated modal appearance with depth"
mood = ["professional", "premium"]
effects = [
    { layer = "mask", effect = "Iris", params = { shape = "Box", soft_edge = 0.15 } },
    { layer = "shader", effect = "StochasticSparkle", params = { sparkle_density = 0.03, speed = 0.2 } },
    { layer = "shadow", effect = "HalfBlock", params = { offset_x = 2, offset_y = 1 } },
]

[recipes.error_shake]
description = "Attention-grabbing error feedback"
mood = ["urgent", "error"]
effects = [
    { layer = "filter", effect = "RigidShake", params = { num_shakes = 3, max_eighths = 10 } },
    { layer = "style", effect = "RigidShakeStyle", params = {} },
]
notes = "Ensure widget has 2-cell margins on each side"

[recipes.retro_crt]
description = "Nostalgic CRT monitor aesthetic"
mood = ["retro", "gaming"]
effects = [
    { layer = "sampler", effect = "Crt", params = { scanline_strength = 0.3, curvature = 0.1 } },
    { layer = "filter", effect = "Crt", params = { scanline_strength = 0.2, glow = 0.1 } },
    { layer = "shader", effect = "NeonFlicker", params = { stability = 0.85 } },
]

[recipes.loading_shimmer]
description = "Skeleton loading state with movement"
mood = ["loading", "modern"]
effects = [
    { layer = "shader", effect = "GlistenBand", params = { speed = 0.5, band_width = 3, angle_deg = -15 } },
]

[recipes.list_item_hover]
description = "Responsive list item hover feedback"
mood = ["interactive", "selection"]
effects = [
    { layer = "filter", effect = "HoverBar", params = { base_eighths = 2, max_eighths = 8 } },
]

# ═══════════════════════════════════════════════════════════════════════════════
# CONSTRAINTS
# What doesn't work together, performance notes, compatibility.
# ═══════════════════════════════════════════════════════════════════════════════

[[constraints.conflicts]]
a = "Crt_sampler"
b = "Ripple"
reason = "Both distort coordinates, visual chaos"

[[constraints.conflicts]]
a = "RigidShake"
b = "SubCellShake"
reason = "Competing shake effects"

[[constraints.performance_notes]]
effect = "StochasticSparkle"
note = "Lower speed (0.1-0.3) for smoother animation"

[[constraints.performance_notes]]
effect = "BrailleDust"
note = "Balance density vs hz for performance"

[[constraints.performance_notes]]
effect = "multiple_filters"
note = "Filters applied sequentially, each has cost"

[[constraints.terminal_compatibility]]
effect = "Braille_shadow"
note = "Font-dependent rendering quality"

[[constraints.terminal_compatibility]]
effect = "BrailleDust"
note = "Requires braille font support"

# ═══════════════════════════════════════════════════════════════════════════════
# COMPOSITION PIPELINE
# Render order and how effects combine.
# Source: crates/tui-vfx-compositor/src/pipeline/cls_composition_options.rs
# ═══════════════════════════════════════════════════════════════════════════════

[pipeline]
description = "Effects apply in specific order for predictable composition"

# Render order (1 = first, applied at bottom)
[pipeline.render_order]
sampler = { order = 1, description = "Coordinate distortion applied first" }
shadow = { order = 2, description = "Rendered beneath element (extended area)" }
element = { order = 3, description = "Main content rendered" }
mask = { order = 4, description = "Applied to shadow + element together" }
shader = { order = 5, description = "Per-cell styling throughout" }
filter = { order = 6, description = "Post-processing applied last" }

# CompositionOptions key fields
[pipeline.options]
sampler_spec = "Optional coordinate distortion"
masks = "Array of masks (combined with mask_combine_mode)"
mask_combine_mode = "AND (all must pass) or OR (any passes)"
filters = "Array of post-processing filters (applied in order)"
shader_layers = "Per-region shaders with optional bounds"
shadow = "Optional integrated shadow"
t = "Animation progress 0.0-1.0"
loop_t = "Cyclical time for continuous effects"
phase = "Entering/Dwelling/Exiting/Finished"

# ═══════════════════════════════════════════════════════════════════════════════
# TERMINAL COMPATIBILITY
# What works where and what doesn't.
# ═══════════════════════════════════════════════════════════════════════════════

[compatibility]
description = "Effect compatibility across terminal types"

[compatibility.universal]
description = "Works on all TrueColor terminals"
effects = [
    "All masks",
    "All filters",
    "All style effects",
    "LinearGradient, PulseWave, BorderSweep shaders",
    "All content transformers",
    "HalfBlock and Solid shadow styles",
]

[compatibility.font_dependent]
description = "May vary based on terminal font"
effects = [
    { effect = "Braille shadow", note = "Requires braille unicode support" },
    { effect = "BrailleDust filter", note = "Requires braille unicode support" },
    { effect = "StochasticSparkle", note = "When using braille noise type" },
]

