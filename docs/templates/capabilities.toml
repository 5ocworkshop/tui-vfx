# tui-vfx Capabilities Manifest
#
# This file is the editorial source of truth for effect documentation.
# Technical details (types, defaults) come from rustdoc comments in source code.
# Editorial details (use cases, hints, moods) are defined here.
#
# Run `cargo xtask docs generate` to merge sources and generate:
#   - docs/CAPABILITIES.md (human-readable reference)
#   - docs/generated/ai-context.md (condensed AI prompt)
#
# See docs/design/CAPABILITY_MANIFEST_*.md for architecture details.

# <FILE>docs/templates/capabilities.toml</FILE> - <DESC>Editorial manifest for tui-vfx capabilities</DESC>
# <VERS>VERSION: 2.2.2</VERS>
# <WCTX>Docs coverage: include new powerline parameters</WCTX>
# <CLOG>Expand ai_hint for GlistenSweep and KittScanner powerline fields</CLOG>

[meta]
version = "2.2.2"
description = "tui-vfx visual effects capability manifest"

# ═══════════════════════════════════════════════════════════════════════════════
# TAXONOMY
# ═══════════════════════════════════════════════════════════════════════════════

[taxonomy.layers]
sampler = "Distorts coordinates before rendering. Applied first."
shadow = "Depth effect rendered beneath element."
mask = "Controls visibility (0.0-1.0). Used for transitions."
shader = "Per-cell styling based on position/time. Visual texture."
filter = "Post-processing on rendered output. Applied last."
content = "Text transformation. Modifies characters themselves."

[taxonomy.phases]
entering = "Element appearing (t: 0→1 reveals)"
dwelling = "Element stable, ambient effects active"
exiting = "Element leaving (t: 0→1 hides)"

# ═══════════════════════════════════════════════════════════════════════════════
# MASKS
# Visibility control for transitions. All operate on t (0.0→1.0).
# Source: crates/tui-vfx-compositor/src/types/cls_mask_spec.rs
# ═══════════════════════════════════════════════════════════════════════════════

[effects.masks.None]
use_cases = ["none", "baseline", "passthrough"]
energy = "calm"
ai_hint = "No mask effect, fully visible passthrough. Use to disable masking."

[effects.masks.Wipe]
use_cases = ["transition", "reveal", "cinematic"]
energy = "calm"
complexity = "simple"
ai_hint = """Classic film-style linear reveal/hide.
reveal/hide: WipeDirection (16 variants - cardinal, diagonal, aliases, center-out).
soft_edge: blur transition (0.1-0.2 for smooth, 0 for hard edge)."""

[effects.masks.Dissolve]
use_cases = ["transition", "dream-sequence", "magical"]
energy = "moderate"
complexity = "simple"
ai_hint = """Random pixel dissolve transition.
seed: randomization seed for consistent patterns.
chunk_size: 1-2 for subtle shimmer, 4+ for retro/pixelated look."""

[effects.masks.Checkers]
use_cases = ["transition", "retro", "playful"]
energy = "moderate"
complexity = "simple"
ai_hint = """Checkerboard pattern reveal.
cell_size: size of checker squares.
Retro TV/game aesthetic, pairs well with CRT effects."""

[effects.masks.Blinds]
use_cases = ["transition", "presentation"]
energy = "calm"
complexity = "simple"
ai_hint = """Venetian blinds effect for professional presentations.
orientation: Horizontal or Vertical slats.
count: number of blind slats."""

[effects.masks.Iris]
use_cases = ["transition", "dramatic", "spotlight"]
energy = "moderate"
complexity = "simple"
ai_hint = """Spotlight/iris reveal expanding from center.
shape: Circle (smooth), Diamond (angular), Box (rectangular).
soft_edge: blur transition at iris boundary."""

[effects.masks.Diamond]
use_cases = ["transition", "dramatic"]
energy = "moderate"
complexity = "simple"
ai_hint = """Diamond shape expanding from center.
soft_edge: blur at diamond boundary for smoother reveal."""

[effects.masks.NoiseDither]
use_cases = ["transition", "retro", "subtle"]
energy = "calm"
complexity = "simple"
ai_hint = """Dithered noise pattern transition.
seed: randomization seed for consistent patterns.
matrix: Bayer4 (subtle 4x4 dither), Bayer8 (more visible 8x8 dither)."""

[effects.masks.PathReveal]
use_cases = ["transition", "creative", "animated"]
energy = "moderate"
complexity = "moderate"
ai_hint = """Path-based reveal following a geometric trajectory.
path: Spiral (playful inward/outward), Radial (dramatic sweep).
soft_edge: blur at reveal boundary."""

[effects.masks.Radial]
use_cases = ["transition", "dramatic", "reveal"]
energy = "moderate"
complexity = "simple"
ai_hint = """Radial expansion from configurable origin point.
origin: Center, TopLeft, TopRight, BottomLeft, BottomRight, Custom(x,y).
soft_edge: blur at radial boundary."""

[effects.masks.Cellular]
use_cases = ["transition", "organic", "creative"]
energy = "moderate"
complexity = "moderate"
ai_hint = """Organic cellular pattern reveal.
pattern: Voronoi (natural/organic), Hexagonal (tech/futuristic), Organic (irregular).
seed: randomization seed. cell_count: number of cells in pattern."""

# WipeDirection variants (16 total):
# Cardinal: LeftToRight, RightToLeft, TopToBottom, BottomToTop
# Diagonal: TopLeftToBottomRight, TopRightToBottomLeft, BottomLeftToTopRight, BottomRightToTopLeft
# Aliases: FromLeft, FromRight, FromTop, FromBottom
# Center-Out (Barn Door): HorizontalCenterOut, VerticalCenterOut, HorizontalEdgesIn, VerticalEdgesIn

# ═══════════════════════════════════════════════════════════════════════════════
# FILTERS
# Post-processing effects. Applied after rendering.
# Source: crates/tui-vfx-compositor/src/types/cls_filter_spec.rs
# ═══════════════════════════════════════════════════════════════════════════════

[effects.filters.None]
use_cases = ["none", "baseline", "passthrough"]
energy = "calm"
ai_hint = "No filter effect, passthrough output. Use to disable filtering."

[effects.filters.Dim]
use_cases = ["background", "inactive", "subtle"]
energy = "calm"
complexity = "simple"
ai_hint = """Darken output uniformly.
factor: 0.0=black, 1.0=unchanged (0.5 typical for dimming).
apply_to: Foreground, Background, or Both."""

[effects.filters.Invert]
use_cases = ["highlight", "dramatic", "selection"]
energy = "moderate"
complexity = "simple"
ai_hint = """Color inversion (negative) effect.
apply_to: Foreground, Background, or Both.
Creates high-contrast selection or dramatic effect."""

[effects.filters.Tint]
use_cases = ["mood", "branding", "overlay"]
energy = "calm"
complexity = "simple"
ai_hint = """Apply color overlay/tint.
color: tint color to apply.
strength: blend intensity (0.0=none, 1.0=full tint).
apply_to: Foreground, Background, or Both."""

[effects.filters.Vignette]
use_cases = ["focus", "cinematic", "premium"]
energy = "calm"
complexity = "simple"
ai_hint = """Edge darkening that draws focus to center.
strength: intensity of darkening at edges.
radius: how far vignette extends from edges (signal-driven).
Cinematic focus effect for premium surfaces."""

[effects.filters.Crt]
use_cases = ["retro", "gaming", "nostalgic"]
energy = "moderate"
complexity = "moderate"
ai_hint = """CRT monitor post-processing effect.
scanline_strength: intensity of horizontal scanlines (0.2-0.4 typical).
glow: phosphor glow amount around bright pixels.
Pairs well with Crt sampler for full retro effect."""

[effects.filters.PatternFill]
use_cases = ["texture", "background", "decoration"]
energy = "calm"
complexity = "simple"
ai_hint = """Background texture patterns.
pattern: Single (char), Checkerboard (char_a, char_b), HorizontalLines, VerticalLines.
color: pattern color. only_empty: only fill empty cells.
See PatternType variants for full options."""

[effects.filters.Greyscale]
use_cases = ["disabled", "inactive", "dramatic"]
energy = "calm"
complexity = "simple"
ai_hint = """Desaturate output using BT.601 luminance formula.
strength: desaturation amount (0.0=color, 1.0=full greyscale).
apply_to: Foreground, Background, or Both.
Ideal for disabled/inactive states."""

[effects.filters.BrailleDust]
use_cases = ["ambient", "texture", "premium"]
energy = "calm"
complexity = "moderate"
premium = true
ai_hint = """Animated braille particles for ambient texture.
density: particle coverage (0.05=sparse, 0.2=dense).
hz: animation speed/update rate.
seed: randomization seed. color: particle color.
pattern: SingleDot (subtle), OneToTwoDots, OneToThreeDots, OneToFourDots (visible).
Requires braille font support."""

[effects.filters.InterlaceCurtain]
use_cases = ["retro", "loading", "effect"]
energy = "calm"
complexity = "simple"
ai_hint = """Scanline/interlace dimming effect.
density: row spacing (1.0=every other row). dim_factor: per-row darkening amount.
scroll_speed: animates the scanlines."""

[effects.filters.MotionBlur]
use_cases = ["movement", "speed", "dynamic"]
energy = "moderate"
complexity = "moderate"
ai_hint = """Directional blur trail.
direction: Left/Right/Up/Down. trail_length: number of trailing cells.
opacity_decay: controls falloff sharpness."""

[effects.filters.ColorBridgedShade]
use_cases = ["opacity", "fade", "subtle"]
energy = "calm"
complexity = "moderate"
ai_hint = """Maps opacity to shade characters (░▒▓█) with color bridging.
fg_color, bg_color: endpoint colors for shading transitions.
Smooth color transitions at shade boundaries."""

[effects.filters.SubPixelBar]
use_cases = ["loading", "progress", "indicator"]
energy = "calm"
complexity = "simple"
ai_hint = """High-resolution progress bar with 8x cell precision.
Uses ▏▎▍▌▋▊▉█ (horizontal) or ▁▂▃▄▅▆▇█ (vertical) partial blocks.
progress: 0.0-1.0 fill amount.
direction: Horizontal or Vertical.
filled_color, unfilled_color: bar colors.
animated: true cycles progress automatically with t parameter."""

[effects.filters.SubCellShake]
use_cases = ["error", "tactile", "feedback"]
energy = "intense"
complexity = "moderate"
ai_hint = """Physical edge vibration using ▏▎▍▌▋▊▉ partial blocks.
Simulates tactile feedback like incorrect password shake.
amplitude: shake intensity. frequency: oscillation rate.
seed: randomization. edge_only: true limits to widget borders.
filled_color, bg_color: vibration colors.
Best for error/rejection feedback, button press responses."""

[effects.filters.RigidShake]
use_cases = ["error", "attention", "tactile-feedback", "notification"]
energy = "intense"
complexity = "advanced"
premium = true
ai_hint = """Ketchup bottle damped oscillation. Multiple diminishing shakes then pause.
IMPORTANT: Apply to area INCLUDING margin cells (margin_width default 2).
Key params: shake_period=0.29s, num_shakes=4, pause_duration=0.52s, max_eighths=12 (1.5 cells).
damping array controls amplitude decay (e.g., [1.0, 0.7, 0.45, 0.25]).
Pairs with RigidShakeStyle for synchronized text italic."""

[effects.filters.RigidShake.notes]
requires = ["margin_cells"]
pairs_with = ["RigidShakeStyle"]

[effects.filters.HoverBar]
use_cases = ["hover", "selection", "indicator"]
energy = "calm"
complexity = "simple"
ai_hint = """Progress-driven partial bar using ▏▎▍▌▋▊▉█ with fg/bg inversion.
base_eighths: width at rest (0-8), max_eighths: width at full (0-16, spans 2 cells).
position: Left/Right, margin_width default 2. Ideal for list selection."""

[effects.filters.UnderlineWipe]
use_cases = ["hover", "link", "indicator"]
energy = "calm"
complexity = "simple"
ai_hint = """Underline wipes in based on progress.
direction: WipeDirection, line_char default ▁, row_offset from bottom.
gradient: enable gradient fade. glisten: add highlight sweep for hover polish."""

[effects.filters.BracketEmphasis]
use_cases = ["hover", "selection", "emphasis"]
energy = "calm"
complexity = "simple"
ai_hint = "Brackets fade in at content edges based on progress. left/right chars default [ ]. Fades from bg_color to color."

[effects.filters.DotIndicator]
use_cases = ["selection", "navigation", "indicator"]
energy = "calm"
complexity = "simple"
ai_hint = """Dot/bullet fades in adjacent to content.
progress: 0.0-1.0 fade amount. indicator_char default •, position Left/Right.
For list selection and navigation."""

[effects.filters.GlistenSweep]
use_cases = ["hover", "shine", "premium"]
energy = "calm"
complexity = "simple"
ai_hint = """Diagonal 45-degree highlight sweep for polished hover feedback.
boost: brightness increase (default 40, 0-255).
band_width: glisten width as fraction of diagonal (0.2 typical).
speed: animation rate (0.5 default, 0=manual progress only).
progress: 0.0=inactive, 1.0=fully visible.
powerline_mode: true to handle powerline separators safely (bg on text, fg on separators).
boost_separator_bg: true to also boost separator backgrounds for continuous powerlines.
Creates premium "shine" effect for buttons and cards on hover."""

[effects.filters.KittScanner]
use_cases = ["hover", "retro", "sci-fi"]
energy = "moderate"
complexity = "simple"
ai_hint = """Horizontal ping-pong scanner (KITT/Larson scanner) effect.
boost: brightness increase (default 50).
band_width: scanner column width (0.15 default, 0.0-0.5).
bps: beats per second for ping-pong cycle (1.0 = 2 second full cycle).
progress: 0.0=inactive, 1.0=fully active.
apply_to: which channel to boost (fg, bg, or both) when not in powerline mode.
powerline_mode: true to handle powerline separators safely.
boost_separator_bg: true to also boost separator backgrounds for continuous powerlines.
Full-height scanning column with smooth ping-pong motion.
Classic Knight Rider aesthetic for retro sci-fi hover states."""

[effects.filters.ShadeScanner]
use_cases = ["hover", "reveal", "retro"]
energy = "moderate"
complexity = "simple"
ai_hint = """Ping-pong scanner that dims text with shade overlay (░).
shade_color: overlay color (default rgb(40,40,45)).
bps: beats per second for ping-pong cycle.
progress: 0.0=inactive, 1.0=fully active.
Text left of scanner position gets progressively dimmed.
Creates wave of dimming that washes over and retreats.
Retro terminal aesthetic with dramatic reveal/dim effect."""

[effects.filters.PillButton]
use_cases = ["button", "hover", "premium"]
energy = "calm"
complexity = "moderate"
ai_hint = """Pill-shaped button with gradient edges and optional glisten.
button_color: main button fill color.
bg_color: background for gradient fade at edges.
edge_width: cells for gradient transition (default 3).
glisten: enable shimmer effect on hover (default true).
progress: hover state (0.0=rest, 1.0=fully hovered).
Creates no-border button with smooth bg→button→bg gradient.
Brightens on hover, adds moving glisten when progress>0.5."""

# PatternType variants:
# - Single: Repeating character (char)
# - Checkerboard: Alternating characters (char_a, char_b)
# - HorizontalLines: Row lines (line_char, spacing)
# - VerticalLines: Column lines (line_char, spacing)

# BraillePatternType variants (for BrailleDust):
# - SingleDot: Most subtle (⠁ ⠂ ⠄)
# - OneToTwoDots: Subtle
# - OneToThreeDots: Moderate
# - OneToFourDots: More visible

# ═══════════════════════════════════════════════════════════════════════════════
# SAMPLERS
# Coordinate distortion. Applied before rendering.
# Source: crates/tui-vfx-compositor/src/types/cls_sampler_spec.rs
# ═══════════════════════════════════════════════════════════════════════════════

[effects.samplers.None]
use_cases = ["none", "baseline", "passthrough"]
energy = "calm"
ai_hint = "No sampling distortion, direct coordinate passthrough."

[effects.samplers.SineWave]
use_cases = ["wavy", "underwater", "dream"]
energy = "moderate"
complexity = "simple"
ai_hint = """Sinusoidal wave distortion for underwater/dream effects.
axis: Horizontal, Vertical, or Both wave direction.
amplitude: wave height in cells. frequency: wave density.
speed: animation rate. phase: wave offset."""

[effects.samplers.Ripple]
use_cases = ["water", "impact", "attention"]
energy = "moderate"
complexity = "moderate"
ai_hint = """Circular ripple emanating from center point.
amplitude: ripple height. wavelength: distance between ripple rings.
speed: outward expansion rate.
center: ripple origin point (default center).
Water drop/impact effect. Don't combine with Crt sampler."""

[effects.samplers.Shredder]
use_cases = ["glitch", "transition", "destruction"]
energy = "intense"
complexity = "moderate"
ai_hint = """Paper shredder strips effect for destruction/transitions.
stripe_width: width of each strip in cells.
odd_speed: movement speed of odd-numbered strips.
even_speed: movement speed of even-numbered strips (opposite creates shearing)."""

[effects.samplers.FaultLine]
use_cases = ["glitch", "error", "dramatic"]
energy = "intense"
complexity = "moderate"
ai_hint = """Fault line displacement like tectonic shift.
seed: randomization seed for fault placement.
intensity: displacement amount.
split_bias: tendency to split horizontally vs vertically.
Earthquake/glitch effect for errors or dramatic moments."""

[effects.samplers.Crt]
use_cases = ["retro", "gaming", "nostalgic"]
energy = "moderate"
complexity = "moderate"
ai_hint = """CRT monitor scanlines and barrel curvature distortion.
scanline_strength: intensity of horizontal lines.
jitter: random scanline displacement amount.
curvature: barrel distortion (0=flat, 0.1-0.2 typical).
Pairs with Crt filter for full retro CRT aesthetic."""

[effects.samplers.CrtJitter]
use_cases = ["glitch", "error", "retro"]
energy = "intense"
complexity = "moderate"
ai_hint = """CRT crash/jitter effect simulating failing monitor.
intensity: jitter displacement amount.
speed_hz: jitter frequency in Hz.
decay_ms: how quickly jitter settles after trigger.
For error states or retro malfunction aesthetics."""

# ═══════════════════════════════════════════════════════════════════════════════
# SHADERS (Spatial)
# Per-cell styling based on position and time.
# Source: crates/tui-vfx-style/src/models/cls_spatial_shader_type.rs
# ═══════════════════════════════════════════════════════════════════════════════

[effects.shaders.LinearGradient]
use_cases = ["background", "premium", "branding"]
energy = "calm"
complexity = "simple"
ai_hint = """Gradient fill at configurable angle.
gradient: color stops array defining the gradient.
angle_deg: rotation angle (0=horizontal, 90=vertical, -45=diagonal).
Elegant for backgrounds and premium surfaces."""

[effects.shaders.BarberPole]
use_cases = ["loading", "progress", "playful"]
energy = "moderate"
complexity = "simple"
ai_hint = """Animated diagonal stripes like a barber pole.
speed: stripe animation rate.
stripe_width: width of colored stripes in cells.
gap_width: width between stripes.
color: stripe color.
Classic loading indicator style."""

[effects.shaders.Radar]
use_cases = ["scanning", "loading", "tech"]
energy = "moderate"
complexity = "moderate"
ai_hint = """Rotating radar sweep effect.
speed: rotation rate (revolutions per second).
tail_length: angular length of the sweep trail.
color: sweep highlight color.
Scanning/search indicator for tech interfaces."""

[effects.shaders.BorderSweep]
use_cases = ["selection", "focus", "highlight"]
energy = "moderate"
complexity = "moderate"
ai_hint = """Border highlight that sweeps around widget edges.
speed: sweep animation rate around perimeter.
length: highlight segment length in cells.
color: highlight color.
Ideal for focus indication and selection states."""

[effects.shaders.Highlighter]
use_cases = ["emphasis", "reveal", "attention"]
energy = "moderate"
complexity = "simple"
ai_hint = """Marker-style text highlighting effect.
color: highlighter color (typically yellow/green).
Reveals text as if being highlighted with a marker pen.
Ideal for emphasizing important text progressively."""

[effects.shaders.Reflect]
use_cases = ["premium", "loading", "shine"]
energy = "calm"
complexity = "simple"
ai_hint = """Moving reflective glint across surface.
speed: glint movement rate.
color: highlight color for the glint.
Premium surface effect for polished/metallic appearance."""

[effects.shaders.GlistenBand]
use_cases = ["loading", "premium", "shine"]
energy = "calm"
complexity = "moderate"
premium = true
ai_hint = """Moving light band sweep for elegant loading shimmer.
speed: band movement rate (0.5 typical).
band_width: width of the light band in cells.
angle_deg: band angle (-15 diagonal typical).
head, tail: gradient colors at band edges.
direction: sweep direction.
repeat_count: number of bands visible.
apply_to: Foreground/Background/Both.
blend_strength: intensity of the effect."""

[effects.shaders.GlitchLines]
use_cases = ["error", "glitch", "dramatic"]
energy = "intense"
complexity = "moderate"
ai_hint = """Random horizontal glitch lines for errors/warnings.
seed: randomization seed. intensity: effect strength.
max_lines: maximum concurrent glitch lines.
speed: line movement/flicker rate.
flash_chance: probability of bright flashes.
pulse_color: flash highlight color.
pulse_speed: flash animation rate.
italic_on_flash: apply italic during flashes.
flash_hold: flash duration.
noise_type: Uniform or Gaussian distribution."""

[effects.shaders.NeonFlicker]
use_cases = ["retro", "neon", "ambient"]
energy = "moderate"
complexity = "moderate"
ai_hint = """Flickering neon tube simulation.
stability: 0.85=subtle flicker, 0.5=dying tube, 1.0=steady.
seed: randomization seed.
segment: which tube segment to affect (for multi-segment signs).
dim_amount: brightness reduction during flicker.
speed: flicker rate.
flash_chance: probability of bright flashes.
decay_rate: how quickly brightness returns after flicker.
noise_type: Uniform or Gaussian flicker patterns."""

[effects.shaders.PulseWave]
use_cases = ["attention", "loading", "ambient"]
energy = "moderate"
complexity = "simple"
ai_hint = """Rippling color wave effect.
frequency: wave density.
speed: wave animation rate.
color: wave highlight color.
direction: wave propagation direction.
wavelength: distance between wave peaks.
Attention/loading indicator for selection states."""

[effects.shaders.FocusedRowGradient]
use_cases = ["selection", "list", "navigation"]
energy = "calm"
complexity = "moderate"
ai_hint = """Vertical gradient highlighting selected row.
selected_row: row index to highlight.
selected_row_ratio: alternative selection by ratio (0.0-1.0).
falloff_distance: gradient fade distance from selected row.
bright_color: highlight color for selected row.
dim_color: color for non-selected rows.
apply_to: Foreground/Background/Both.
Ideal for list navigation and row selection."""

[effects.shaders.RevealWipe]
use_cases = ["reveal", "transition", "text"]
energy = "calm"
complexity = "simple"
ai_hint = """Progressive reveal wipe driven by t parameter.
direction: WipeDirection for reveal direction.
Reveals content progressively, ideal for text/data display."""

[effects.shaders.StochasticSparkle]
use_cases = ["premium-surface", "frosted-glass", "texture", "ambient"]
energy = "calm"
complexity = "moderate"
premium = true
ai_hint = """Film grain / frosted glass shimmer for premium surfaces.
sparkle_density: fraction of cells (0.05=5%), brightness_boost: multiplier (1.2=20% brighter).
speed: 0.25=shimmer, 1.0=static. noise_type: Uniform (even) or Gaussian (clustered).
apply_to: Foreground/Background/Both."""

[effects.shaders.AmbientOcclusion]
use_cases = ["depth", "premium", "3d"]
energy = "calm"
complexity = "moderate"
premium = true
ai_hint = """Contact shadow darkening cells near widget edges.
edges: BottomRight (default), TopLeft, All, Inner.
falloff: Linear, Quadratic (default), Exponential.
intensity: darkness strength. radius: falloff distance in cells.
Creates depth by simulating light occlusion at boundaries."""

[effects.shaders.Bevel]
use_cases = ["3d", "buttons", "emboss"]
energy = "calm"
complexity = "moderate"
ai_hint = """3D embossed edge effect simulating raised or sunken surfaces.
light_direction: TopLeft (default), TopRight, BottomLeft, BottomRight, Top, Bottom, Left, Right.
edge_width: bevel thickness in cells.
highlight_intensity and shadow_intensity: edge light and shadow strength."""

[effects.shaders.Glow]
use_cases = ["focus", "premium", "highlight"]
energy = "calm"
complexity = "moderate"
premium = true
ai_hint = """Multi-cell bloom/halo around widget edges.
radius: glow extent. intensity: brightness of the glow.
falloff: Linear, Quadratic, Exponential. pulse_speed: optional pulsing in Hz."""

[effects.shaders.SubCellShake]
use_cases = ["error", "vibration", "attention"]
energy = "intense"
complexity = "moderate"
ai_hint = """Micro-jitter via rapid color oscillation.
amplitude: shake strength. frequency: oscillation rate.
axis: Horizontal, Vertical, Both (default). chromatic: RGB channel separation.
edge_only: limit to widget borders. For chromatic aberration effect."""

[effects.shaders.ChromaticEdge]
use_cases = ["glitch", "premium", "effect"]
energy = "moderate"
complexity = "moderate"
ai_hint = """RGB edge separation for chromatic aberration effect.
intensity: separation amount between color channels.
edge_width: width of affected edge region.
horizontal: true for horizontal separation, false for vertical.
Premium lens distortion effect or glitch aesthetic."""

# ═══════════════════════════════════════════════════════════════════════════════
# STYLE EFFECTS
# Temporal animations driven by t (0.0→1.0).
# Source: crates/tui-vfx-style/src/models/cls_style_effect.rs
# ═══════════════════════════════════════════════════════════════════════════════

[effects.styles.FadeIn]
use_cases = ["enter", "reveal", "transition"]
energy = "calm"
complexity = "simple"
ai_hint = """Opacity fade in driven by t parameter.
apply_to: Foreground, Background, or Both.
ease: easing function for animation curve.
Classic entrance effect, pairs with any mask."""

[effects.styles.FadeOut]
use_cases = ["exit", "hide", "transition"]
energy = "calm"
complexity = "simple"
ai_hint = """Opacity fade out driven by t parameter.
apply_to: Foreground, Background, or Both.
ease: easing function for animation curve.
