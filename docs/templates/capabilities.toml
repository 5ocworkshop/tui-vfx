stability: 0.0-1.0 (higher = more stable, lower = dying tube).
Retro neon sign aesthetic with randomized flicker."""

[effects.styles.Spatial]
use_cases = ["custom", "advanced"]
energy = "varies"
complexity = "advanced"
ai_hint = """Wraps any SpatialShaderType as a style effect.
shader: the spatial shader to apply. angle_deg: rotation for shader orientation.
Allows using spatial shaders in style effect contexts.
Advanced composition for custom animations."""

[effects.styles.ItalicWindow]
use_cases = ["emphasis", "animation", "text"]
energy = "calm"
complexity = "simple"
ai_hint = """Apply italic style during a time window.
start: t value when italic begins.
end: t value when italic ends.
Text emphasis animation for timed highlights."""

[effects.styles.ColorShift]
use_cases = ["mood", "transition", "effect"]
energy = "calm"
complexity = "simple"
ai_hint = """HSL color manipulation over time.
hue_shift: hue rotation amount.
saturation_shift: saturation adjustment.
lightness_shift: brightness adjustment.
Mood transitions and color effects."""

[effects.styles.ColorFade]
use_cases = ["transition", "mood", "branding"]
energy = "calm"
complexity = "simple"
ai_hint = """Fade toward target color based on t parameter.
target: destination color.
color_space: RGB or HSL interpolation.
Smooth color transitions for mood or branding changes."""

[effects.styles.RigidShakeStyle]
use_cases = ["error", "attention", "sync"]
energy = "intense"
complexity = "advanced"
