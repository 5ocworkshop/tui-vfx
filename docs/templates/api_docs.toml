[entry_points]
section_title = "Unified Entry Points"

[entry_points.render_pipeline]
order = 1
subtitle = "full superset"
description = "Primary entry point accepting CompositionOptions"
notes = "**Use this for everything.** It accepts the full `CompositionOptions` superset, including shadows and `preserve_unfilled`."

[entry_points.render_pipeline_with_area]
order = 2
description = "Convenience overload using RenderArea"
notes = "Convenience overload using `RenderArea { width, height, offset_x, offset_y }`."

[entry_points.render_pipeline_with_spec]
order = 3
subtitle = "data-driven"
description = "Data-driven entry point using serializable CompositionSpec"
notes = "Uses `CompositionSpec` (serializable) and `SpatialShaderType` layers, including shadow and `preserve_unfilled` support."

[entry_points.render_pipeline_with_spec_area]
order = 4
description = "Spec variant with RenderArea convenience"

