# tui-vfx API Documentation Manifest
#
# This file is the editorial source of truth for API documentation.
# Technical details (types, fields, signatures) come from code introspection.
# Editorial details (descriptions, examples, notes) are defined here.
#
# Run `cargo xtask docs api` to generate docs/generated/API.md
#
# See docs/design/API_DOC_GENERATION_PLAN.md for architecture details.

# <FILE>docs/templates/api_docs.toml</FILE> - <DESC>Editorial manifest for tui-vfx API documentation</DESC>
# <VERS>VERSION: 3.0.1</VERS>
# <WCTX>Public release prep</WCTX>
# <CLOG>Align OFPF version with manifest meta.version</CLOG>

[meta]
version = "3.0.1"
description = "tui-vfx API documentation editorial content"

# ═══════════════════════════════════════════════════════════════════════════════
# DOCUMENT STRUCTURE
# ═══════════════════════════════════════════════════════════════════════════════

[structure]
title = "TUI-VFX Complete API Reference"
intro = """
The Pipeline API is the **single unified interface** for applying visual effects to terminal
grids. You provide a source grid, configure a composition, and render a fully composited
frame into a destination grid.

**Key idea:** `CompositionOptions` is the superset entry point (supports every capability,
including shadows). `CompositionSpec` is the serializable, data-driven variant and now
supports shadows and `preserve_unfilled`.
"""

[structure.parts]
compositor = { order = 1, title = "Compositor Pipeline", description = "Core rendering pipeline and configuration" }
shadows = { order = 2, title = "Shadows", description = "Depth effects beneath elements" }
style = { order = 3, title = "Style System", description = "Per-cell styling and effects" }
content = { order = 4, title = "Content Transformers", description = "Text content modifications" }
geometry = { order = 5, title = "Geometry & Motion", description = "Transitions, motion paths, easing" }
prelude = { order = 6, title = "Prelude & Imports", description = "Recommended imports" }

