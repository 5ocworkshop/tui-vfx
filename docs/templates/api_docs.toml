# SHADOWS
# ═══════════════════════════════════════════════════════════════════════════════

[specs.ShadowConfig]
part = "shadows"
section_title = "ShadowConfig"
intro = """
Shadows come from the `tui-vfx-shadow` crate and can be rendered **directly**
or **integrated** into the compositor via `ShadowSpec`.

Shadow compositing is controlled by `composite_mode`: the default `GlyphOverlay` replaces
destination content with shadow glyphs, while `GradeUnderlying` preserves destination glyphs
and applies color grading (desaturate, dim, tint) scaled by shadow coverage.
Use `.with_dramatic_grade()` for a visible preset with stronger background than foreground grading.
"""

[specs.ShadowStyle]
part = "shadows"
section_title = "ShadowStyle"
variants = [
    { name = "HalfBlock", note = "(default) — best quality sub-cell shadows" },
    { name = "Braille { density }", note = "— 2x4 subpixel grid, font-dependent" },
    { name = "Solid", note = "— maximum compatibility" },
    { name = "Gradient { layers }", note = "— multi-layer soft shadow" },
]

[specs.ShadowEdges]
part = "shadows"
section_title = "ShadowEdges (bitflags)"
variants = ["RIGHT", "BOTTOM", "LEFT", "TOP"]
convenience = ["BOTTOM_RIGHT", "TOP_LEFT", "ALL"]
rule = "edges only render when the offset direction matches (e.g., `RIGHT` requires `offset_x > 0`)."

[specs.ShadowCompositeMode]
part = "shadows"
section_title = "ShadowCompositeMode"
variants = [
    { name = "GlyphOverlay", note = "(default) — shadow glyphs replace destination content" },
    { name = "GradeUnderlying", note = "— destination glyphs preserved; color grading applied" },
]

[specs.ShadowGradeConfig]
part = "shadows"
section_title = "ShadowGradeConfig"
description = "Controls dim, desaturate, and tint strengths for grade-underlying mode. Use `ShadowGradeConfig::dramatic()` for the recommended visible preset."

[specs.ShadowSpec]
part = "shadows"
section_title = "Compositor integration"
example = """
```rust
// Standard glyph-overlay shadow (default)
let options = CompositionOptions::default()
    .with_shadow(ShadowSpec::new(my_shadow_config));

// Dramatic grade-underlying shadow
let dramatic_config = ShadowConfig::new(Color::BLACK.with_alpha(180))
    .with_offset(2, 1)
    .with_dramatic_grade();
let options = CompositionOptions::default()
    .with_shadow(ShadowSpec::new(dramatic_config));
```
"""
see_also = "For full guidance and examples, see `docs/HOWTO_SHADOWS.md`."

