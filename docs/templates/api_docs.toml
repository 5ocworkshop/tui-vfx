# CORE TYPES
# ═══════════════════════════════════════════════════════════════════════════════

[types.CompositionOptions]
part = "compositor"
subtitle = "runtime superset"
builder_methods = [
    "`.with_mask(MaskSpec)` / `.with_masks(Cow<[MaskSpec]>)`",
    "`.with_filter(FilterSpec)` / `.with_filters(Cow<[FilterSpec]>)`",
    "`.with_mask_combine_mode(MaskCombineMode)`",
    "`.with_shader_layer(&dyn StyleShader, StyleRegion)`",
    "`.with_shadow(impl Into<ShadowSpec>)`",
    "`.with_preserve_unfilled(bool)`",
]
builder_title = "Builder methods (ergonomic entry point)"

[types.CompositionSpec]
part = "compositor"
subtitle = "serializable"
notes = """
- Intended for JSON/TOML-driven configs.
- Uses `ShaderLayerSpec` + `SpatialShaderType` (serializable).
- `shadow` uses the same `ShadowSpec` as runtime `CompositionOptions`.
- `ShadowSpec` is serializable and wraps `ShadowConfig` (style, edges, soft edges, composite mode, grade).
- `preserve_unfilled` defaults to `true` to match runtime behavior.
"""

[types.ShaderWithRegion]
part = "compositor"
description = "Runtime shader instance with region"
notes = "Use `ShaderWithRegion` for runtime shader instances and `ShaderLayerSpec` for serialized specs."

[types.ShaderLayerSpec]
part = "compositor"
description = "Serializable shader layer specification"

[types.ShadowConfig]
part = "shadows"
subtitle = "configuration"
description = "Shadow rendering configuration used by ShadowSpec and render_shadow."
notes = "See specs.ShadowConfig for integration details."

