[specs.MaskSpec]
part = "compositor"
section_title = "MaskSpec"
description = "Masks control cell visibility based on position and animation progress `t`."

[specs.MaskSpec.notes.wipe_semantics]
title = "Wipe semantics"
content = """
`Wipe` supports **reveal** or **hide** direction:
- `reveal`: content appears traveling in this direction
- `hide`: content disappears traveling in this direction
- `direction`: legacy alias for `reveal`

Exactly one of `reveal`, `hide`, or `direction` should be set.
"""

[specs.MaskSpec.enums.WipeDirection]
title = "WipeDirection (16 variants)"
groups = [
    { name = "Cardinal", variants = ["LeftToRight", "RightToLeft", "TopToBottom", "BottomToTop"] },
    { name = "Diagonal", variants = ["TopLeftToBottomRight", "TopRightToBottomLeft", "BottomLeftToTopRight", "BottomRightToTopLeft"] },
    { name = "Aliases", variants = ["FromLeft", "FromRight", "FromTop", "FromBottom"] },
    { name = "Center-out (curtains opening)", variants = ["HorizontalCenterOut", "VerticalCenterOut"] },
    { name = "Edges-in (curtains closing)", variants = ["HorizontalEdgesIn", "VerticalEdgesIn"] },
]

